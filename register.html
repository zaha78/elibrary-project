<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - E-Library</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <!-- Navbar -->
 <nav>
  <h1><i class="fa-solid fa-book"></i> E-Library</h1>

  <ul>
    <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="books.html" class="active"><i class="fa-solid fa-book-open"></i> Books</a></li>
    <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a></li>
    <li><a href="register.html"><i class="fa-solid fa-user-plus"></i> Register</a></li>
    <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
  </ul>
</nav>

  <!-- Register Section -->
  <section class="login-container">
    <div class="login-box">
      <h2>Create Account</h2>

      <form onsubmit="return registerUser(event)">

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit">Register</button>

        <p class="extra">
          Already have an account? <a href="login.html">Login</a>
        </p>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; <span id="year"></span> E-Library. All rights reserved.
  </footer>

  <!-- Scripts -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function registerUser(e) {
      e.preventDefault();

      const password = document.querySelectorAll("input[type='password']")[0].value;
      const confirmPassword = document.querySelectorAll("input[type='password']")[1].value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
      }

      alert("Registration successful (demo only)");
      return true;
    }
  </script>

</body>
</html>
